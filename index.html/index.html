<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>LAB 주간보고 통합 시스템</title>
    <style>
        :root { 
            --primary: #546e7a; --primary-light: #eceff1; --success: #66bb6a; --bg: #f8f9fa; 
            --border: #cfd8dc; --accent: #ff9800; --active-gray: #78909c; --pdf: #e53935;
        }
        
        body { 
            font-family: 'Malgun Gothic', sans-serif; 
            padding: 20px 10px; background: var(--bg); color: #333; 
            display: flex; flex-direction: column; align-items: center; margin: 0;
        }

        h1, .target-date, #input-card, #resultView { width: 100%; max-width: 1100px; box-sizing: border-box; }
        
        table { width: 100%; border-collapse: collapse; margin-bottom: 25px; table-layout: fixed; }
        
        th { 
            background: #f1f3f5; width: 22%; font-size: 0.9rem !important; font-weight: 800 !important; 
            color: #263238; border: 1px solid #cfd8dc; padding: 10px 12px; text-align: left; vertical-align: middle; 
        }

        td, .editable, .content-view, .cto-lab-item, .cto-lab-item b { 
            font-size: 0.9rem !important; line-height: 1.4 !important; 
        }
        
        td { border: 1px solid #cfd8dc; padding: 8px 12px; text-align: left; vertical-align: top; background: #fff; }
        
        .content-view { position: relative; padding-left: 15px; display: block; margin-bottom: 2px; }
        .content-view::before { 
            content: "■"; position: absolute; left: 0; top: 4px; 
            font-size: 0.45rem; color: var(--primary); opacity: 0.8;
        }

        /* [모바일 대응] 768px 이하일 때 테이블 구조 변경 */
        @media (max-width: 768px) {
            th { width: 100% !important; display: block; border-bottom: none; }
            td { width: 100% !important; display: block; border-top: 1px solid #eee; }
            .header-box { flex-direction: column; align-items: flex-start !important; gap: 10px; }
            .lab-input { width: 100% !important; }
            .sticky-sub-nav { overflow-x: auto; justify-content: flex-start !important; white-space: nowrap; padding: 10px 5px; }
            .nav-week-ctrl { flex-direction: column; gap: 10px; }
            #viewFooter { flex-direction: column; align-items: stretch; }
            .btn-view-action { width: 100%; min-width: 0; }
        }

        .editable { border: 1px solid #ced4da; padding: 10px; min-height: 80px; border-radius: 4px; background: #fff; outline: none; }

        h1 { text-align: center; color: #111; margin-top: 0; margin-bottom: 10px; font-size: 1.5rem; }
        .target-date { 
            text-align: center; font-weight: bold; font-size: 0.9rem; color: var(--primary); 
            margin: 0 auto 20px auto; background: #fff; display: block; 
            width: fit-content; padding: 8px 20px; border-radius: 50px; border: 1px solid var(--border);
        }

        .card { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 30px; border: 1px solid #e9ecef; width: 100%; box-sizing: border-box;}
        
        .sticky-sub-nav { position: sticky; top: 0; z-index: 1000; background: rgba(255,255,255,0.95); padding: 10px; border-bottom: 2px solid var(--primary); display: flex; justify-content: center; flex-wrap: nowrap; gap: 6px; }
        .btn-q { padding: 8px 12px; font-size: 0.85rem; cursor: pointer; border: 1px solid #dee2e6; background: #fff; border-radius: 4px; font-weight: bold; flex-shrink: 0; }
        .btn-q.active-section { background: var(--active-gray) !important; color: white !important; }

        h2 { font-size: 1.1rem; color: #263238; margin: 30px 0 15px; padding-bottom: 8px; border-bottom: 2px solid #cfd8dc; }
        h3 { font-size: 0.95rem; margin: 25px 0 10px; background: var(--primary-light); padding: 10px; border-radius: 4px; border-left: 5px solid var(--primary); font-weight: bold; }
        
        .header-box { display: flex; justify-content: space-between; padding: 15px; background: #f1f3f5; border-radius: 8px; margin-bottom: 15px; align-items: center; }
        .lab-input { padding: 8px; width: 250px; border: 2px solid #ced4da; border-radius: 4px; font-size: 0.9rem; }
        
        .action-area { display: flex; flex-direction: column; gap: 10px; margin: 30px 0; }
        .main-btn-style { width: 100%; padding: 14px; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; border: none; transition: 0.2s; }
        .reg-btn { background: var(--success); color: white; }
        .btn-mode { flex: 1; background: #fff; color: var(--primary); border: 1.5px solid #cfd8dc; }
        .btn-mode.active { background: var(--primary); color: white; }
        
        .nav-week-ctrl { display: flex; align-items: center; justify-content: center; gap: 15px; background: var(--primary-light); padding: 10px; border-radius: 8px; margin-bottom: 20px; width: 100%; box-sizing: border-box; }
        .section-tag { font-weight: bold; margin: 25px 0 10px; display: block; font-size: 1rem; color: var(--primary); border-left: 5px solid var(--primary); padding-left: 12px; }

        #viewFooter { display: flex; justify-content: center; gap: 10px; margin-top: 25px; padding-top: 20px; border-top: 2px solid #eee; width: 100%; }
        .btn-view-action { 
            padding: 12px 20px; font-size: 0.9rem; font-weight: bold; border-radius: 6px; 
            cursor: pointer; border: 1px solid var(--border); background: #fff; transition: 0.2s; min-width: 120px; 
            color: #455a64;
        }
        .btn-footer-gray { background: #90a4ae !important; color: white !important; border: none !important; }
        .btn-footer-delete { color: #90a4ae !important; border-color: #cfd8dc !important; }

        @media print {
            body { padding: 0; background: white; align-items: stretch; }
            #input-card, .nav-week-ctrl, #labButtons, .sticky-sub-nav, h1, #viewFooter { display: none !important; }
            .card { box-shadow: none; border: none; padding: 0; width: 100%; max-width: none; }
        }

        #overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); z-index:1999; }
        #labSelector { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:white; padding:20px; border-radius:12px; z-index:2000; width:85%; max-width:350px; text-align:center; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
    </style>
</head>
