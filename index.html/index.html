<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>LAB 주간보고 통합 시스템</title>
    <style>
        :root { 
            --primary: #546e7a; --primary-light: #eceff1; --success: #66bb6a; --bg: #f8f9fa; 
            --border: #cfd8dc; --btn-edit: #78909c; --btn-del: #b0bec5; 
        }
        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; background: var(--bg); color: #333; max-width: 1200px; margin: auto; }
        h1 { text-align: center; color: #111; margin-top: 30px; margin-bottom: 5px; }
        .target-date { text-align: center; font-weight: bold; font-size: 1.1rem; color: #555; margin-bottom: 30px; }
        .card { background: #fff; padding: 25px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #e9ecef; }
        .quick-nav-bar { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; padding: 15px 0; border-bottom: 1px solid #eee; margin-bottom: 20px; }
        .sticky-sub-nav { position: sticky; top: 0; z-index: 1000; background: rgba(255,255,255,0.98); padding: 10px; border-bottom: 2px solid var(--primary); display: flex; justify-content: center; flex-wrap: wrap; gap: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .btn-q { padding: 8px 14px; font-size: 0.85rem; cursor: pointer; border: 1px solid #dee2e6; background: #fff; color: #495057; border-radius: 4px; font-weight: bold; transition: 0.2s; }
        .btn-q:hover { background: var(--primary-light); border-color: var(--primary); }
        h2 { font-size: 1.25rem; color: #263238; margin: 40px 0 15px; padding-bottom: 10px; border-bottom: 2px solid #cfd8dc; scroll-margin-top: 20px; }
        h3 { font-size: 1.1rem; margin: 25px 0 10px; background: var(--primary-light); padding: 12px; border-radius: 4px; color: #37474f; scroll-margin-top: 100px; }
        .header-box { display: flex; justify-content: space-between; align-items: center; background: #f1f3f5; padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        .lab-input { padding: 10px; width: 250px; border: 2px solid #ced4da; border-radius: 4px; font-size: 1rem; }
        .editable { border: 1px solid #ced4da; padding: 15px; min-height: 80px; border-radius: 4px; background: #fff; line-height: 1.6; outline: none; margin-bottom: 15px; }
        .action-area { display: flex; flex-direction: column; gap: 10px; margin: 40px 0; }
        .main-btn-style { width: 100%; padding: 18px; font-size: 1.15rem; font-weight: bold; border-radius: 8px; cursor: pointer; border: none; text-align: center; }
        .reg-btn { background: var(--success); color: white; }
        .mode-btns { display: flex; gap: 10px; }
        .btn-mode { flex: 1; background: #fff; color: var(--primary); border: 1.5px solid #cfd8dc; }
        .btn-mode.active { background: var(--primary); color: white; border-color: var(--primary); }
        .nav-week-ctrl { display: flex; align-items: center; justify-content: center; gap: 20px; background: var(--primary-light); padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .week-display { font-size: 1.2rem; font-weight: bold; color: var(--primary); min-width: 200px; text-align: center; }
        .btn-nav { padding: 10px 20px; font-size: 1.2rem; cursor: pointer; border-radius: 5px; border: 1px solid var(--border); background: #fff; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 35px; table-layout: fixed; }
        th, td { border: 1px solid #cfd8dc; padding: 12px; text-align: left; word-break: break-all; vertical-align: top; }
        th { background: #f8f9fa; width: 22%; font-size: 0.9rem; font-weight: bold; color: #455a64; }
        .section-tag { font-weight: bold; margin: 30px 0 10px; display: block; font-size: 1.1rem; color: var(--primary); border-left: 5px solid var(--primary); padding-left: 12px; }
        .btn-group-view { display: flex; justify-content: center; gap: 15px; margin-top: 30px; padding: 20px; background: #f8f9fa; border-radius: 10px; }
        .btn-view-action { padding: 14px 40px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; border: none; }
        .btn-edit-view { background: var(--btn-edit); color: white; }
        .btn-delete-view { background: #fff; color: #d32f2f; border: 1px solid #d32f2f; }
    </style>
</head>
<body>

<h1>📊 주간보고 통합 시스템</h1>
<div id="targetDateDisplay" class="target-date"></div>

<div class="card" id="input-card">
    <div class="header-box">
        <div><strong>Lab 이름:</strong> <input type="text" id="labName" class="lab-input" placeholder="예: 서비스개발Lab"></div>
        <div id="writeDay"></div>
    </div>

    <div class="quick-nav-bar">
        <button class="btn-q" onclick="goTo('section-1')">1. 금주/차주 일정</button>
        <button class="btn-q" onclick="goTo('section-2')">2. 지시사항 F/U</button>
        <button class="btn-q" onclick="goTo('section-3')">3. 장애/작업/기타</button>
        <button class="btn-q" onclick="goTo('section-4')">4. 최우선과제 현황</button>
    </div>

    <h2 id="section-1">1. 금주/차주 LAB별 주요 일정</h2><div id="container-1"></div>
    <h2 id="section-2">2. 차주 지시사항 F/U</h2><div id="container-2"></div>
    <h2 id="section-3">3. 주요 장애/작업/기타 보고사항</h2><div id="container-3"></div>
    <h2 id="section-4">4. Lab 별 최우선과제 추진 현황</h2><div id="sub-nav-4" class="sticky-sub-nav"></div><div id="container-4"></div>
    
    <div class="action-area">
        <button class="main-btn-style reg-btn" onclick="saveData()">등록하기</button>
        <div class="mode-btns">
            <button id="btn-lab" class="main-btn-style btn-mode" onclick="setMode('lab')">Lab 별 주간보고 조회</button>
            <button id="btn-cto" class="main-btn-style btn-mode" onclick="setMode('cto')">CTO 통합 주간보고 조회</button>
        </div>
    </div>
</div>

<div id="resultView" style="display:none;">
    <div class="nav-week-ctrl">
        <button id="prevWeek" class="btn-nav" onclick="moveWeek(1)">◀ 이전 주</button>
        <div id="weekDisplay" class="week-display">데이터 없음</div>
        <button id="nextWeek" class="btn-nav" onclick="moveWeek(-1)">다음 주 ▶</button>
    </div>
    <div class="card">
        <div id="labButtons" style="margin-bottom:20px; display: flex; gap: 5px; flex-wrap: wrap; justify-content: center;"></div>
        <div id="output"></div>
    </div>
</div>

<script>
    const fuList = ["AX 기술 Stack 확보", "서비스 생산시스템 체계 전환", "Claud/SaaS 전환", "기본기강화", "기타"];
    const issueList = ["장애", "기타"];
    const priMap = {
        "1) AX 기술 Stack 확보": ["SRM align 상용화 계획", "경쟁우위율 목표 수립", "SaaS 기반 AX 모듈 구축", "소버린 클라우드"],
        "2) SaaS 기술 Stack 확보": ["모듈화 대상 선정", "SaaS 상품화 요구사항", "기술 개발 로드맵", "SaaS 공통 기술 개발"],
        "3) 서비스 생산 시스템 체계 전환": ["SDLC AX화", "SRM-PPM-TRM 연계", "기술 자산화", "개발 프로세스 표준화", "외주협력 관리체계", "Visibility 시스템"],
        "4) AX Readiness": ["가격 경쟁력", "Workflow 최적화", "AXOps 로드맵", "Data Foundry", "거버넌스 및 플랫폼"],
        "5) Claud/SaaS 전환": ["플랫폼 설계/구축", "Assessment", "시범 서비스 전환"],
        "6) IT SaaS 전환": ["IT SaaS 로드맵", "IT 시스템 통합", "Jira/Conf 통합", "업무환경 AI 도입"],
        "7) Autonomous Development": ["직접/외주/운영 AX 식별", "시스템/Tool 검토"],
        "8) Data 기반 Seg. 체계 구축": ["Seg 별 데이터 구축", "영업 에이전트 구축"],
        "9) Simply U+ 상품/서비스 혁신": ["상품 서비스 혁신", "구조 최적화"],
        "10) AX 상품 경쟁력 강화(AICC)": ["ixi-O 글로벌화", "AICC SaaS 플랫폼", "AICC 수주 대응"],
        "11) AX 상품 경쟁력 강화(B2B)": ["ixi-Enterprise", "ixi-Drive", "보안 SaaS"],
        "12) AX 상품 경쟁력 강화(B2C)": ["일등로밍/스마트CS", "통합안심 요금제", "홈사업 고객경험개선", "5G SA"],
        "13) 고객중심 E2E 품질 체계 구축": ["체크리스트/SOP 강화", "프로세스 재정립", "MTTR 개선"],
        "14) 지속 가능한 보안 실행력 강화": ["CTO 보안 5대과제", "자산관리 인벤토리", "불용 데이터 정비"],
        "15) 개발/운영 효율화 (ZBB)": ["예산관리 프로세스", "인건비 효율화", "수선비/임차료 효율화"]
    };

    let db = JSON.parse(localStorage.getItem('weeklyDB') || '[]');
    let currentWeekIdx = 0;
    let sortedWeeks = [];

    function safeStr(v) { return (v === undefined || v === null || v === 'undefined') ? "" : String(v).trim(); }
    function isEmpty(h) { const s = safeStr(h); return s === "" || s === "<br>" || s === "<div><br></div>"; }
    function goTo(id) { const el = document.getElementById(id); if(el) window.scrollTo({ top: el.offsetTop - 20, behavior: "smooth" }); }

    function getWeekInfo(date) {
        const d = new Date(date); d.setHours(0,0,0,0); d.setDate(d.getDate() + 4 - (d.getDay() || 7));
        const firstDay = new Date(d.getFullYear(), d.getMonth(), 1);
        const week = Math.ceil((((d - firstDay) / 86400000) + firstDay.getDay() + 1) / 7);
        return { full: `${d.getFullYear()}년 ${d.getMonth() + 1}월 ${week}주차`, display: `현재 작성 주차 : ${d.getFullYear()}년 ${d.getMonth() + 1}월 ${week}주차` };
    }
    const curWeek = getWeekInfo(new Date());

    window.onload = function() {
        document.getElementById('targetDateDisplay').innerText = curWeek.display;
        document.getElementById('writeDay').innerText = `작성일: ${new Date().toLocaleDateString()}`;
        const createEditor = (cont, label, id) => {
            document.getElementById(cont).innerHTML += `<div class="editor-wrapper"><strong>▶ ${label}</strong><div id="${id}" class="editable" contenteditable="true"></div></div>`;
        };
        ["금주 주요 일정", "차주 주요 일정"].forEach((l, i) => createEditor('container-1', l, `s1-${i}`));
        fuList.forEach((l, i) => createEditor('container-2', l, `s2-${i}`));
        issueList.forEach((l, i) => createEditor('container-3', l, `issue-${i}`));
        Object.keys(priMap).forEach((title, i) => {
            const safeId = `s4-group-${i}`;
            document.getElementById('container-4').innerHTML += `<h3 id="${safeId}">${title}</h3><div id="sub-box-${i}"></div>`;
            document.getElementById('sub-nav-4').innerHTML += `<button class="btn-q" style="font-size:0.75rem;" onclick="goTo('${safeId}')">${title}</button>`;
            priMap[title].forEach((sub, j) => createEditor(`sub-box-${i}`, sub, `s4-${i}-${j}`));
        });
        updateSortedWeeks();
    };

    function updateSortedWeeks() { sortedWeeks = [...new Set(db.map(d => d.weekKey))].sort().reverse(); }
    function moveWeek(dir) { if (currentWeekIdx + dir >= 0 && currentWeekIdx + dir < sortedWeeks.length) { currentWeekIdx += dir; refreshView(); } }

    function setMode(mode, targetWeek = null, targetLab = null) {
        document.getElementById('btn-lab').classList.toggle('active', mode === 'lab');
        document.getElementById('btn-cto').classList.toggle('active', mode === 'cto');
        document.getElementById('resultView').style.display = 'block';
        updateSortedWeeks();
        currentWeekIdx = targetWeek ? sortedWeeks.indexOf(targetWeek) : 0;
        refreshView(mode, targetLab);
        setTimeout(() => window.scrollTo({ top: document.getElementById('resultView').offsetTop - 20, behavior: "smooth" }), 150);
    }

    function refreshView(mode, targetLab = null) {
        updateSortedWeeks();
        if (sortedWeeks.length === 0) {
            document.getElementById('weekDisplay').innerText = "데이터 없음";
            document.getElementById('output').innerHTML = "표시할 데이터가 없습니다.";
            return;
        }
        const week = sortedWeeks[currentWeekIdx];
        document.getElementById('weekDisplay').innerText = week;
        const filtered = db.filter(d => d.weekKey === week);
        const btns = document.getElementById('labButtons');
        btns.innerHTML = "";
        const curMode = mode || (document.getElementById('btn-lab').classList.contains('active') ? 'lab' : 'cto');
        if(curMode === 'lab') {
            filtered.forEach(d => {
                btns.innerHTML += `<button class="btn-q" onclick="renderLab('${week}', '${d.lab}')">${d.lab}</button>`;
            });
            renderLab(week, targetLab || (filtered.length ? filtered[0].lab : null));
        } else { renderCTO(filtered); }
    }

    function renderLab(week, labName) {
        const d = db.find(x => x.weekKey === week && x.lab === labName); if(!d) return;
        let h = `<h2 style="text-align:center;">[${d.lab}] 상세 주간보고</h2>`;
        const makeT = (n, t, lbs, dat) => {
            let rs = lbs.map((l, i) => isEmpty(dat[i]) ? '' : `<tr><th>${l}</th><td>${safeStr(dat[i])}</td></tr>`).filter(Boolean).join('');
            return rs ? `<span class="section-tag">${n}. ${t}</span><table>${rs}</table>` : '';
        };
        h += makeT("1", "주요 일정", ["금주", "차주"], d.d1);
        h += makeT("2", "지시사항 F/U", fuList, d.d2);
        h += makeT("3", "장애/작업/기타", issueList, d.d3);
        let pCont = "";
        Object.keys(priMap).forEach((t, i) => {
            let rs = priMap[t].map((sub, j) => {
                let v = (d.d4 && d.d4[i]) ? d.d4[i][j] : "";
                return isEmpty(v) ? '' : `<tr><th>${sub}</th><td>${safeStr(v)}</td></tr>`;
            }).filter(Boolean).join('');
            if(rs) pCont += `<h3>${t}</h3><table>${rs}</table>`;
        });
        if(pCont) h += `<span class="section-tag">4. 최우선과제</span>` + pCont;
        h += `<div class="btn-group-view">
                <button class="btn-view-action btn-edit-view" onclick="loadToEditor('${d.weekKey}', '${d.lab}')">수정하기</button>
                <button class="btn-view-action btn-delete-view" onclick="deleteData('${d.weekKey}', '${d.lab}')">삭제하기</button>
              </div>`;
        document.getElementById('output').innerHTML = h;
    }

    function renderCTO(filtered) {
        let h = `<h2 style="text-align:center;">CTO 통합 주간보고</h2>`;
        const makeCTO = (num, title, labels, key, isDeep = false, dIdx = 0) => {
            let t = `<span class="section-tag">${num ? num + '. ' : ''}${title}</span><table>`; let has = false;
            labels.forEach((l, i) => {
                let cell = filtered.map(d => {
                    let v = isDeep ? (d.d4 && d.d4[dIdx] ? d.d4[dIdx][i] : "") : d[key][i];
                    return isEmpty(v) ? null : `<div style="margin-bottom:10px; border-bottom:1px dashed #eee;"><b>[${d.lab}]</b><br>${safeStr(v)}</div>`;
                }).filter(Boolean).join('');
                if(cell) { t += `<tr><th>${l}</th><td>${cell}</td></tr>`; has = true; }
            });
            return has ? t + `</table>` : '';
        };
        h += makeCTO("1", "주요 일정", ["금주", "차주"], 'd1');
        h += makeCTO("2", "지시사항 F/U", fuList, 'd2');
        h += makeCTO("3", "장애/작업/기타", issueList, 'd3');
        Object.keys(priMap).forEach((title, i) => h += makeCTO("", title, priMap[title], 'd4', true, i));
        document.getElementById('output').innerHTML = h;
    }

    function saveData() {
        const lab = document.getElementById('labName').value.trim();
        if(!lab || lab === "undefined") { alert("Lab 이름을 정확히 입력하세요."); return; }
        const entry = {
            weekKey: curWeek.full, lab,
            d1: [document.getElementById('s1-0').innerHTML, document.getElementById('s1-1').innerHTML],
            d2: fuList.map((_, i) => document.getElementById(`s2-${i}`).innerHTML),
            d3: issueList.map((_, i) => document.getElementById(`issue-${i}`).innerHTML),
            d4: Object.keys(priMap).map((_, i) => priMap[Object.keys(priMap)[i]].map((_, j) => document.getElementById(`s4-${i}-${j}`).innerHTML))
        };
        db = db.filter(item => !(item.weekKey === curWeek.full && item.lab === lab));
        db.push(entry); localStorage.setItem('weeklyDB', JSON.stringify(db));
        alert("저장되었습니다."); updateSortedWeeks(); setMode('lab', curWeek.full, lab);
    }

    function deleteData(week, labName) {
        if(!confirm(`[${week} / ${labName}] 데이터를 삭제하시겠습니까?`)) return;
        db = db.filter(x => !(x.weekKey === week && x.lab === labName));
        localStorage.setItem('weeklyDB', JSON.stringify(db));
        alert('삭제되었습니다.'); location.reload();
    }

    function loadToEditor(week, labName) {
        const d = db.find(x => x.weekKey === week && x.lab === labName); if(!d) return;
        if(!confirm('내용을 입력창으로 불러올까요?')) return;
        document.getElementById('labName').value = d.lab;
        document.getElementById('s1-0').innerHTML = safeStr(d.d1[0]);
        document.getElementById('s1-1').innerHTML = safeStr(d.d1[1]);
        fuList.forEach((_, i) => document.getElementById(`s2-${i}`).innerHTML = safeStr(d.d2[i]));
        issueList.forEach((_, i) => document.getElementById(`issue-${i}`).innerHTML = safeStr(d.d3[i]));
        Object.keys(priMap).forEach((_, i) => {
            priMap[Object.keys(priMap)[i]].forEach((_, j) => {
                const el = document.getElementById(`s4-${i}-${j}`);
                if(el && d.d4 && d.d4[i]) el.innerHTML = safeStr(d.d4[i][j]);
            });
        });
        window.scrollTo({ top: 0, behavior: "smooth" });
    }
</script>
</body>
</html>
